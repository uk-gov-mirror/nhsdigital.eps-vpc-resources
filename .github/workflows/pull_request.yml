name: deploy_pr

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@889349f9d93e4846a642f7973b7c26b180bec5aa
    permissions:
      attestations: read
      contents: read
      packages: read

  quality_checks:
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@889349f9d93e4846a642f7973b7c26b180bec5aa
    needs: [get_config_values]
    permissions:
      contents: read
      id-token: write
      packages: read
    with:
      pinned_image: "${{ needs.get_config_values.outputs.pinned_image }}"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pr_title_format_check:
    uses: NHSDigital/eps-common-workflows/.github/workflows/pr_title_check.yml@889349f9d93e4846a642f7973b7c26b180bec5aa
    permissions:
      pull-requests: write
  get_issue_number:
    runs-on: ubuntu-22.04
    outputs:
      issue_number: ${{steps.get_issue_number.outputs.result}}

    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        name: get issue number
        id: get_issue_number
        with:
          script: |
            if (context.issue.number) {
              // Return issue number if present
              return context.issue.number;
            } else {
              // Otherwise return issue number from commit
              return (
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  commit_sha: context.sha,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                })
              ).data[0].number;
            }
          result-encoding: string

  tag_release:
    needs: [get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@889349f9d93e4846a642f7973b7c26b180bec5aa
    permissions:
      id-token: write
      contents: write
      packages: write
    with:
      dry_run: true
      pinned_image: "${{ needs.get_config_values.outputs.pinned_image }}"
      branch_name: ${{ github.event.pull_request.head.ref }}
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}

  get_commit_id:
    runs-on: ubuntu-22.04
    outputs:
      commit_id: ${{ steps.commit_id.outputs.commit_id }}
    steps:
      - name: Get Commit ID
        id: commit_id
        run: |
          echo "commit_id=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  package_code:
    needs: [quality_checks, get_issue_number, get_commit_id, get_config_values]
    uses: ./.github/workflows/cdk_package_code.yml
    permissions:
      contents: read
      id-token: write
      packages: read
    with:
      pinned_image: "${{ needs.get_config_values.outputs.pinned_image }}"
      VERSION_NUMBER: ${{needs.get_issue_number.outputs.issue_number}}
      COMMIT_ID: ${{needs.get_commit_id.outputs.commit_id}}

  show_dev_changes:
    needs: [quality_checks, get_issue_number, package_code, get_commit_id, get_config_values]
    uses: ./.github/workflows/cdk_release_code.yml
    permissions:
      contents: write
      id-token: write
    with:
      pinned_image: "${{ needs.get_config_values.outputs.pinned_image }}"
      TARGET_ENVIRONMENT: dev
      VERSION: ${{needs.get_issue_number.outputs.issue_number}}
      COMMIT_ID: ${{needs.get_commit_id.outputs.commit_id}}
      CDK_APP_NAME: VpcResourcesApp
      CDK_RESOURCE_STACK_NAME: VpcResourcesStack
      DEPLOYED_STACK_NAME: vpc-resources
      LOG_RETENTION_IN_DAYS: 30
      DEPLOY_CDK_CODE: false
      FORWARD_CSOC_LOGS: false
    secrets:
      CDK_DEPLOY_ROLE: ${{ secrets.DEV_CLOUD_FORMATION_DEPLOY_ROLE }}
